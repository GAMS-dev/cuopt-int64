name: Build INT64 Wheel

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    container: nvidia/cuda:13.1.1-devel-ubuntu24.04

    env:
      PIP_BREAK_SYSTEM_PACKAGES: 1
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3-pip python3-dev python-is-python3 \
            build-essential ninja-build \
            libbz2-dev zlib1g-dev \
            libssl-dev libcurl4-openssl-dev \
            git pkg-config libtbb-dev libboost-all-dev
          pip install cmake rapids-build-backend scikit-build-core pybind11 cython
          
      - name: Build Wheel
        run: |
          ./build.sh libmps_parser libcuopt cuopt
          
      - name: Upload Wheel as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuopt-int64-wheel
          path: python/cuopt/dist/*.whl